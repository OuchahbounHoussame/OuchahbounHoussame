<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    
    <!-- Blue accent -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    
    <!-- Purple accent -->
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    
    <!-- Glow filter (static) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2332" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    
    <pattern id="gridLarge" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a2a3a" stroke-width="0.3" opacity="0.3"/>
    </pattern>

    <!-- Glassmorphism panel -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#gridLarge)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- ===== GLOW ORBS ===== -->
  <circle cx="1000" cy="50" r="100" fill="#3b82f6" opacity="0.08" filter="url(#glow)"/>
  <circle cx="200" cy="250" r="80" fill="#8b5cf6" opacity="0.06" filter="url(#glow)"/>

  <!-- ===== TECH LINES (left) ===== -->
  <g stroke="#3b82f6" stroke-width="0.4" opacity="0.08">
    <line x1="30" y1="50" x2="200" y2="50"/>
    <line x1="40" y1="80" x2="180" y2="80"/>
    <line x1="20" y1="110" x2="220" y2="110"/>
    <line x1="50" y1="140" x2="160" y2="140"/>
  </g>

  <!-- ===== TECH LINES (right) ===== -->
  <g stroke="#8b5cf6" stroke-width="0.4" opacity="0.08">
    <line x1="1000" y1="60" x2="1170" y2="60"/>
    <line x1="1020" y1="90" x2="1150" y2="90"/>
    <line x1="1010" y1="120" x2="1160" y2="120"/>
    <line x1="1040" y1="150" x2="1120" y2="150"/>
  </g>

  <!-- ===== CODE SYMBOLS ===== -->
  <g font-family="'Courier New', monospace" font-weight="bold" font-size="24" fill="#3b82f6" opacity="0.08">
    <text x="60" y="100">{ }</text>
    <text x="130" y="210">&lt; / &gt;</text>
    <text x="90" y="160">( )</text>
    <text x="1080" y="110">{ }</text>
    <text x="1020" y="230">&lt; / &gt;</text>
    <text x="1120" y="180">( )</text>
  </g>

  <!-- ===== GLASSMORPHISM PANEL ===== -->
  <rect x="230" y="50" width="740" height="200" rx="20" fill="url(#glassGrad)" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
  <rect x="232" y="52" width="736" height="196" rx="18" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.3"/>

  <!-- ===== DECORATIVE LINE ===== -->
  <line x1="280" y1="50" x2="920" y2="50" stroke="url(#blueAccent)" stroke-width="0.8" opacity="0.3"/>

  <!-- ===== MAIN NAME ===== -->
  <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI', 'Arial', sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="1">
    Houssam Ouchahboun
  </text>

  <!-- ===== SUBTITLE ===== -->
  <text x="600" y="138" text-anchor="middle" font-family="'Segoe UI', 'Arial', sans-serif" font-size="15" font-weight="400" fill="#8899bb" letter-spacing="2">
    Computer Science Student • Full Stack Developer • Tech Creator
  </text>

  <!-- ===== DECORATIVE UNDERLINE ===== -->
  <line x1="440" y1="155" x2="760" y2="155" stroke="url(#purpleAccent)" stroke-width="0.8" opacity="0.4"/>

  <!-- ===== TECH TAGS ===== -->
  <g font-family="'Segoe UI', 'Arial', sans-serif" font-size="10" font-weight="600">
    <!-- Tag backgrounds -->
    <rect x="330" y="175" width="62" height="24" rx="12" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <rect x="402" y="175" width="70" height="24" rx="12" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
    <rect x="482" y="175" width="64" height="24" rx="12" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <rect x="556" y="175" width="48" height="24" rx="12" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
    <rect x="614" y="175" width="54" height="24" rx="12" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <rect x="678" y="175" width="48" height="24" rx="12" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

    <!-- Tag texts -->
    <text x="361" y="191" text-anchor="middle" fill="#60a5fa">React.js</text>
    <text x="437" y="191" text-anchor="middle" fill="#a78bfa">JavaScript</text>
    <text x="514" y="191" text-anchor="middle" fill="#60a5fa">Node.js</text>
    <text x="580" y="191" text-anchor="middle" fill="#a78bfa">C++</text>
    <text x="641" y="191" text-anchor="middle" fill="#60a5fa">Python</text>
    <text x="702" y="191" text-anchor="middle" fill="#a78bfa">Git</text>
  </g>

  <!-- ===== CORNER ACCENTS ===== -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.2" fill="none">
    <path d="M 20 40 L 20 20 L 40 20"/>
    <path d="M 1180 40 L 1180 20 L 1160 20"/>
    <path d="M 20 260 L 20 280 L 40 280"/>
    <path d="M 1180 260 L 1180 280 L 1160 280"/>
  </g>

  <!-- ===== GLOW DOTS ===== -->
  <circle cx="260" cy="85" r="2.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="940" cy="120" r="2.5" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="270" cy="200" r="2" fill="#3b82f6" opacity="0.2"/>
  <circle cx="930" cy="180" r="2" fill="#8b5cf6" opacity="0.25"/>

  <!-- ===== BOTTOM GLOW ===== -->
  <line x1="250" y1="240" x2="950" y2="240" stroke="url(#purpleAccent)" stroke-width="0.5" opacity="0.15"/>

</svg>
