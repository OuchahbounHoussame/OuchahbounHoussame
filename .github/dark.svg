<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="40%" stop-color="#0d1117"/>
      <stop offset="70%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>

    <!-- Accent gradient 1 - blue -->
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Accent gradient 2 - purple -->
    <linearGradient id="accentPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glassmorphism effect -->
    <filter id="glass">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Animated gradient for glow -->
    <linearGradient id="animatedGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3">
        <animate attributeName="offset" values="0.5;1.5;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0">
        <animate attributeName="offset" values="1;2;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Particle template -->
    <circle id="particle" r="1.5" fill="#3b82f6" opacity="0.6">
      <animate attributeName="cy" values="300;0;300" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Cyber grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2332" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <pattern id="gridLarge" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a2a3a" stroke-width="0.3" opacity="0.3"/>
    </pattern>

    <!-- Floating code symbols template -->
    <g id="codeSymbol">
      <text font-family="'Fira Code', 'JetBrains Mono', monospace" font-weight="bold" fill="#3b82f6" opacity="0.15">
        <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite"/>
      </text>
    </g>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- ===== DIGITAL GRID ===== -->
  <rect width="1200" height="300" fill="url(#gridLarge)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- ===== ANIMATED GLOW ORB (top right) ===== -->
  <circle cx="1000" cy="50" r="120" fill="url(#animatedGlow)" filter="url(#glowStrong)" opacity="0.3">
    <animate attributeName="r" values="100;140;100" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== ANIMATED GLOW ORB (bottom left) ===== -->
  <circle cx="150" cy="250" r="80" fill="url(#animatedGlow)" filter="url(#glowStrong)" opacity="0.2">
    <animate attributeName="r" values="70;100;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== ABSTRACT TECH LINES ===== -->
  <!-- Left side tech lines -->
  <g opacity="0.08">
    <line x1="20" y1="50" x2="200" y2="50" stroke="#3b82f6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="80" x2="180" y2="80" stroke="#8b5cf6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="15" y1="110" x2="220" y2="110" stroke="#3b82f6" stroke-width="0.3">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="40" y1="140" x2="160" y2="140" stroke="#8b5cf6" stroke-width="0.4">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Right side tech lines -->
  <g opacity="0.08">
    <line x1="1000" y1="60" x2="1180" y2="60" stroke="#3b82f6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3.8s" repeatCount="indefinite"/>
    </line>
    <line x1="1020" y1="90" x2="1160" y2="90" stroke="#8b5cf6" stroke-width="0.4">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4.2s" repeatCount="indefinite"/>
    </line>
    <line x1="1010" y1="120" x2="1170" y2="120" stroke="#3b82f6" stroke-width="0.3">
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="5.5s" repeatCount="indefinite"/>
    </line>
    <line x1="1040" y1="150" x2="1140" y2="150" stroke="#8b5cf6" stroke-width="0.4">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="3.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ===== FLOATING CODE SYMBOLS ===== -->
  <!-- Left symbols -->
  <g font-family="'Fira Code', 'JetBrains Mono', monospace" font-weight="bold" font-size="28" fill="#3b82f6" opacity="0.12">
    <text x="50" y="80" opacity="0.15">
      { }
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="120" y="200" opacity="0.12">
      &lt; / &gt;
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="80" y="150" opacity="0.1">
      ( )
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Right symbols -->
  <g font-family="'Fira Code', 'JetBrains Mono', monospace" font-weight="bold" font-size="28" fill="#8b5cf6" opacity="0.12">
    <text x="1080" y="100" opacity="0.15">
      { }
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="1020" y="220" opacity="0.12">
      &lt; / &gt;
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="4.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="1120" y="180" opacity="0.1">
      ( )
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="3.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ===== GLASSMORPHISM PANEL ===== -->
  <rect x="240" y="55" width="720" height="190" rx="16" fill="#3b82f6" opacity="0.03" filter="url(#glass)"/>
  <rect x="240" y="55" width="720" height="190" rx="16" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>
  <rect x="242" y="57" width="716" height="186" rx="14" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.05"/>

  <!-- ===== GLOW LINE ON TOP ===== -->
  <line x1="300" y1="55" x2="900" y2="55" stroke="url(#accentBlue)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- ===== MAIN TEXT ===== -->
  <!-- Subtle text shadow/glow -->
  <text x="600" y="105" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="38" font-weight="700" fill="#3b82f6" opacity="0.15" filter="url(#glowStrong)">
    Houssam Ouchahboun
  </text>

  <!-- Primary name -->
  <text x="600" y="105" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="1">
    Houssam Ouchahboun
    <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="142" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="15" font-weight="400" fill="#8899bb" letter-spacing="2">
    Computer Science Student • Full Stack Developer • Tech Creator
  </text>

  <!-- Decorative line under subtitle -->
  <line x1="450" y1="158" x2="750" y2="158" stroke="url(#accentBlue)" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- ===== TECH TAGS ===== -->
  <g font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="10" font-weight="500">
    <!-- Tag background -->
    <rect x="340" y="175" width="62" height="22" rx="11" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    <rect x="412" y="175" width="70" height="22" rx="11" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
    <rect x="492" y="175" width="64" height="22" rx="11" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    <rect x="566" y="175" width="48" height="22" rx="11" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
    <rect x="624" y="175" width="54" height="22" rx="11" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    <rect x="688" y="175" width="48" height="22" rx="11" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>

    <!-- Tag text -->
    <text x="371" y="190" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">React.js</text>
    <text x="447" y="190" text-anchor="middle" fill="#a78bfa" letter-spacing="0.5">JavaScript</text>
    <text x="524" y="190" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">Node.js</text>
    <text x="590" y="190" text-anchor="middle" fill="#a78bfa" letter-spacing="0.5">C++</text>
    <text x="651" y="190" text-anchor="middle" fill="#60a5fa" letter-spacing="0.5">Python</text>
    <text x="712" y="190" text-anchor="middle" fill="#a78bfa" letter-spacing="0.5">Git</text>
  </g>

  <!-- ===== DECORATIVE GLOW DOTS ===== -->
  <circle cx="260" cy="90" r="2" fill="#3b82f6" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="120" r="2" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="200" r="1.5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="930" cy="180" r="1.5" fill="#8b5cf6" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== PARTICLES ===== -->
  <use href="#particle" x="180" y="0">
    <animate attributeName="x" values="180;220;180" dur="6s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="350" y="0">
    <animate attributeName="x" values="350;400;350" dur="7s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="750" y="0">
    <animate attributeName="x" values="750;800;750" dur="5.5s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="900" y="0">
    <animate attributeName="x" values="900;950;900" dur="6.5s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="1050" y="0">
    <animate attributeName="x" values="1050;1100;1050" dur="7.5s" repeatCount="indefinite"/>
  </use>

  <!-- ===== BOTTOM GLOW LINE ===== -->
  <line x1="250" y1="245" x2="950" y2="245" stroke="url(#accentPurple)" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- ===== CORNER ACCENTS ===== -->
  <!-- Top left -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Top right -->
  <path d="M 1180 40 L 1180 20 L 1160 20" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <!-- Bottom left -->
  <path d="M 20 260 L 20 280 L 40 280" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Bottom right -->
  <path d="M 1180 260 L 1180 280 L 1160 280" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.8s" repeatCount="indefinite"/>
  </path>

  <!-- ===== MINIMAL AI/PROGRAMMING ELEMENTS ===== -->
  <!-- Small circuit-like dots -->
  <circle cx="28" cy="30" r="2" fill="#3b82f6" opacity="0.3">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1172" cy="30" r="2" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="r" values="2;3;2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="270" r="2" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="r" values="2;3;2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1172" cy="270" r="2" fill="#3b82f6" opacity="0.3">
    <animate attributeName="r" values="2;3;2" dur="2.8s" repeatCount="indefinite"/>
  </circle>

</svg>

