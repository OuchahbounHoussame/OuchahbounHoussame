<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <rect width="1200" height="300" fill="#0d1117"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.1"/>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <text x="600" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff">
    Houssam Ouchahboun
  </text>
  <text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8899bb">
    Computer Science Student • Full Stack Developer • Tech Creator
  </text>
  
  <rect x="340" y="180" width="520" height="30" rx="15" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa">
    React.js  •  JavaScript  •  Node.js  •  C++  •  Python  •  Git
